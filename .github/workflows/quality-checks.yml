name: Agent Swarm - Quality Checks

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, master, develop]

jobs:
  quality-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi
      
      - name: Run Harness Audit
        id: audit
        run: |
          if [ -f "bin/harness" ]; then
            ./bin/harness audit --score > audit-report.txt
            SCORE=$(grep "Score:" audit-report.txt | grep -o '[0-9]\+' || echo "0")
            echo "score=$SCORE" >> $GITHUB_OUTPUT
            cat audit-report.txt
          else
            echo "вљ пёЏ Harness tool not found. Skipping audit."
            echo "score=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Architecture Enforcement
        run: |
          if [ -f "bin/harness" ]; then
            ./bin/harness enforce --check || {
              echo "вќЊ Architecture violations detected"
              exit 1
            }
          fi
      
      - name: Check Golden Rules
        run: |
          if [ -f "bin/harness" ]; then
            ./bin/harness golden-rules --check || {
              echo "вљ пёЏ Golden rules violations found"
            }
          fi
      
      - name: Comment Quality Score
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.audit.outputs.score }}';
            const emoji = score >= 80 ? 'рџџў' : score >= 60 ? 'рџџЎ' : 'рџ”ґ';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **Quality Score: ${score}/100**\n\n` +
                    `${score >= 80 ? 'вњ… Excellent quality!' : score >= 60 ? 'вљ пёЏ Needs improvement' : 'вќЊ Quality below threshold'}\n\n` +
                    `See full audit report in the workflow logs.`
            })
      
      - name: Fail if score too low
        if: steps.audit.outputs.score < 60
        run: |
          echo "вќЊ Quality score below threshold (60)"
          exit 1
  
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi
      
      - name: Run tests
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "вљ пёЏ No tests configured"
          fi
      
      - name: Check test coverage
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            echo "Test coverage: $COVERAGE%"
            
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "вљ пёЏ Test coverage below 80%"
            fi
          fi
